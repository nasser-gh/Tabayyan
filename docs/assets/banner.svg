<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 340" role="img" aria-label="Tabayyan — Saudi-first PII detection and redaction for LLM pipelines">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#0e7490"/>
    </linearGradient>
    <style>
      text { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
      .wordmark { font-weight: 800; }
      .ar { font-family: "Segoe UI", "Noto Naskh Arabic", "Geeza Pro", serif; }
    </style>
  </defs>

  <rect width="1280" height="340" rx="20" fill="url(#bg)"/>
  <!-- subtle corner glow -->
  <circle cx="1140" cy="60" r="220" fill="#ffffff" opacity="0.06"/>
  <circle cx="120" cy="320" r="180" fill="#000000" opacity="0.06"/>

  <!-- logo mark -->
  <g transform="translate(72,96)">
    <rect width="112" height="112" rx="26" fill="#ffffff" opacity="0.12"/>
    <rect x="6" y="6" width="100" height="100" rx="22" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.5"/>
    <text x="56" y="76" text-anchor="middle" class="ar wordmark" font-size="60" fill="#ffffff">ت</text>
  </g>

  <!-- wordmark + arabic -->
  <text x="220" y="150" class="wordmark" font-size="72" fill="#ffffff">Tabayyan</text>
  <text x="612" y="150" class="ar wordmark" font-size="60" fill="#ffffff" opacity="0.92">تبيّن</text>

  <!-- tagline -->
  <text x="222" y="196" font-size="27" fill="#e0f2f1" opacity="0.95">Saudi-first PII detection &amp; redaction for LLM pipelines</text>

  <!-- feature chips -->
  <g transform="translate(222,232)" font-size="20" fill="#ffffff">
    <g>
      <rect width="196" height="42" rx="21" fill="#ffffff" opacity="0.14"/>
      <text x="98" y="28" text-anchor="middle">Checksum-validated</text>
    </g>
    <g transform="translate(212,0)">
      <rect width="150" height="42" rx="21" fill="#ffffff" opacity="0.14"/>
      <text x="75" y="28" text-anchor="middle">Unicode-aware</text>
    </g>
    <g transform="translate(378,0)">
      <rect width="108" height="42" rx="21" fill="#ffffff" opacity="0.14"/>
      <text x="54" y="28" text-anchor="middle">Offline</text>
    </g>
    <g transform="translate(502,0)">
      <rect width="132" height="42" rx="21" fill="#ffffff" opacity="0.14"/>
      <text x="66" y="28" text-anchor="middle">LLM guard</text>
    </g>
  </g>
</svg>
